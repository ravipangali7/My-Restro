# Example site block for serving the Vite SPA + Django API behind nginx.
# A POST to /api/... returning "405 Not Allowed" with "nginx/..." in the body
# almost always means /api was not proxied to Django (e.g. only `location /`
# with try_files to index.html, or a static alias under /api).
#
# Copy values (paths, upstream, server_name) to your real server config.
# Order matters: more specific locations (/api/, /media/) must come before `location /`.

upstream myrestro_django {
    # Gunicorn / uvicorn bound to TCP:
    server 127.0.0.1:8000;
    # Or a Unix socket, e.g.:
    # server unix:/run/gunicorn/myrestro.sock fail_timeout=0;
}

server {
    listen 443 ssl http2;
    server_name mithobasai.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # API + uploads — must proxy to Django; do not serve /api from static root.
    location ^~ /api/ {
        proxy_pass http://myrestro_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location ^~ /media/ {
        proxy_pass http://myrestro_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: collected static files served by nginx (faster than Django)
    # location ^~ /static/ {
    #     alias /var/www/myrestro/staticfiles/;
    # }

    location / {
        root /var/www/myrestro/web/dist;
        try_files $uri $uri/ /index.html;
    }
}
